
           
    <di<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Glass Contact Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to top, #0c0c1e 0%, #030307 60%, #000000 100%);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .glass-card {
            width: 700px;
            padding: 40px;
           
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

       
        .profile-pic-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-right: 20px;
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .user-info h2 {
            margin: 0;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .user-info h2 span {
            font-weight: 300;
            opacity: 0.9;
        }

        .user-info p {
            margin: 8px 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .links-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .contact-item {
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        
        .contact-item:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .icon-box {
            width: 85px;
            height: 85px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transition: box-shadow 0.3s ease;
        }

        
        .contact-item:hover .icon-box {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

       
        .fb-icon { background: linear-gradient(145deg, #1877f2, #0a56b9); box-shadow: 0 4px 15px rgba(24, 119, 242, 0.5); }
        .em-icon { background: linear-gradient(145deg, #f44336, #b71c1c); box-shadow: 0 4px 15px rgba(244, 67, 54, 0.5); }
        .ig-icon { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 15px rgba(220, 39, 67, 0.5); }
        .li-icon { background: linear-gradient(145deg, #0077b5, #004182); box-shadow: 0 4px 15px rgba(0, 119, 181, 0.5); }

        .platform {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        
        @media (max-width: 768px) {
            .glass-card { width: 90%; padding: 30px; }
            .links-container { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .header { flex-direction: column; text-align: center; }
            .profile-pic-container { margin-right: 0; margin-bottom: 20px; }
            .icon-box { width: 75px; height: 75px; font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="header">
            <div class="profile-pic-container">
                <img src="55.PNG" alt="Your Name Profile Picture" class="profile-img">
            </div>

            <div class="user-info">
                <h2>Saqlain | <span>Portfolio</span></h2>
                
            </div>
        </div>

        <div class="links-container">
            <a href=https://www.facebook.com/profile.php?id=61574344552015 class="contact-item" target="_blank" rel="noopener noreferrer">
                <div class="icon-box fb-icon"><i class="fab fa-facebook-f"></i></div>
                <span class="platform">Facebook</span>
            </a>

            <a href="mailto:saqlainsahu279@mail.com" class="contact-item">
                <div class="icon-box em-icon"><i class="fas fa-envelope"></i></div>
                <span class="platform">Email</span>
            </a>

            <a href="#" class="contact-item" target="_blank" rel="noopener noreferrer">
                <div class="icon-box ig-icon"><i class="fab fa-instagram"></i></div>
                <span class="platform">Instagram</span>
            </a>

            <a href="#" class="contact-item" target="_blank" rel="noopener noreferrer">
                <div class="icon-box li-icon"><i class="fab fa-linkedin-in"></i></div>
                <span class="platform">LinkedIn</span>
            </a>
        </div>
    </div>

</body>
</html>
